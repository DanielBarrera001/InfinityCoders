<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title> <h2>Formulario de Registro</h2> <br>
</head>
<body>
    <form method="post" action="/send/">
       Código: <input type="code" name="codigo" placeholder="AAAAA 00AA" required> <br><br>
       Nombre: <input type="name" name="nombre" placeholder="Por ejemplo, Daniel" required> <br><br>
        Apellido: <input type="surname" name="apellido" placeholder="Por ejemplo, García" required> <br><br>
        Usuario: <input type="username" name="usuario" placeholder="en minúsculas, por favor" required> <br><br>
        Password: <input type="password" name="pass" placeholder="********" required>
        <input type="hidden" name="informacion" value="12345678" required> <br><br>
        Teléfono: <input type="tel" name="telefono" placeholder="XXXX XXXX" required> <br><br>
        Email: <input type="email" name="correo" placeholder="nombre@dominio.com" required> <br><br>
        <input type="submit" value="Registrar">
    </form>
</body>
</html>
