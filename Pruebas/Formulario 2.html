<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro 2</title>
</head>
<body>
 <form action="Main.html" method="post">
    <h2>Formulario de Registro</h2>
    <br>
    <label for="code">Código:</label>
    <input type="text" id="code" name="code" placeholder="AAAAA 00AA" required>
    <br>
    <br>
    <label for="name">Nombre:</label>
    <input type="text" id="name" name="name" placeholder="Por ejemplo, Daniel" required>
    <br>
    <br>
    <label for="lastname">Apellido:</label>
    <input type="text" id="lastname" name="lastname" placeholder="Por ejemplo, García" required>
    <br>
    <br>
    <label for="user">Usuario:</label>
    <input type="text" id="user" name="user" placeholder="en minúsculas, por favor" required>
    <br>
    <br> 
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" placeholder="********" required>
    <br>
    <br>
    <label for="phone_number">Teléfono:</label>
    <input type="text" id="phone_number" name="phone_number" placeholder="XXXX XXXX" required>
    <br>
    <br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="nombre@dominio.com" required>
    <br>
    <br>
    <input type="submit" value="Registrar">
</body>
</html>
