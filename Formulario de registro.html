<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
</head>
<body>
<form action="Main.html" method="post">
    <h2>Formulario de Registro</h2>
    <br>
    <label for="name">Nombre:</label>
    <input type="text" id="name" name="name" required>
    <br>
    <br>
    <label for="lastname">Apellido:</label>
    <input type="text" id="lastname" name="lastname" required>
    <br>
    <br>
    <label for="gender">Género:</label>
    <br>
    <input type="radio" value="gender"> Masculino
    <br>
    <input type="radio" value="gender"> Femenino
    <br>
    <input type="radio" value="gender"> Otro
    <br>
    <br>
    <label for="other">Intereses:</label>
    <br>
    <input type="checkbox" value="other"> Deportes
    <br>
    <input type="checkbox" value="other"> Música
    <br>
    <input type="checkbox" value="other"> Tecnología
    <br>
    <br>
    <input type="submit" value="Enviar">
</form>
</body>
</html>
